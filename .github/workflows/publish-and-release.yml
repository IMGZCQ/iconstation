name: Publish and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      push_latest:
        description: 'Also push Docker image as latest? (true/false)'
        required: true
        default: 'true'

env:
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: imgzcq/iconstation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  docker:
    name: Build and Push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ inputs.tag_name || github.ref_name }}
            ${{ inputs.push_latest == 'true' && format('{0}/{1}:latest', env.DOCKERHUB_REGISTRY, env.DOCKERHUB_IMAGE_NAME) || '' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Build Binaries and Create Release
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache: false

      - name: Build binaries
        run: |
          VERSION=${{ inputs.tag_name || github.ref_name }}
          
          # Linux x86_64
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o iconstation-linux-amd64 main.go
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o iconstation-linux-arm64 main.go
          
          # Windows x64
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o iconstation-windows-amd64.exe main.go
          
          # macOS x64
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o iconstation-darwin-amd64 main.go
          
          # macOS ARM64
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o iconstation-darwin-arm64 main.go

      - name: Generate checksums
        run: |
          sha256sum iconstation-linux-amd64 > iconstation-linux-amd64.sha256
          sha256sum iconstation-linux-arm64 > iconstation-linux-arm64.sha256
          sha256sum iconstation-windows-amd64.exe > iconstation-windows-amd64.exe.sha256
          sha256sum iconstation-darwin-amd64 > iconstation-darwin-amd64.sha256
          sha256sum iconstation-darwin-arm64 > iconstation-darwin-arm64.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: Release ${{ inputs.tag_name || github.ref_name }}
          files: |
            iconstation-linux-amd64
            iconstation-linux-amd64.sha256
            iconstation-linux-arm64
            iconstation-linux-arm64.sha256
            iconstation-windows-amd64.exe
            iconstation-windows-amd64.exe.sha256
            iconstation-darwin-amd64
            iconstation-darwin-amd64.sha256
            iconstation-darwin-arm64
            iconstation-darwin-arm64.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
